name: Bootstrap State Backend

on:
  workflow_dispatch:
    inputs:
      state_bucket_name:
        description: 'S3 bucket name for Terraform state'
        required: true
        type: string
      lock_table_name:
        description: 'DynamoDB table name for state locking'
        required: false
        default: 'terraform-locks'
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  bootstrap:
    name: "🏗️ Bootstrap State Backend"
    runs-on: ubuntu-latest
    environment:
      name: bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./bootstrap

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="state_bucket_name=${{ inputs.state_bucket_name }}" \
            -var="lock_table_name=${{ inputs.lock_table_name }}" \
            -out=tfplan
        working-directory: ./bootstrap

      - name: Terraform Apply
        run: terraform apply tfplan
        working-directory: ./bootstrap

      - name: Output Backend Configuration
        run: |
          echo "============================================="
          echo "🏗️ STATE BACKEND CREATED"
          echo "============================================="
          terraform output backend_config
          echo "============================================="
        working-directory: ./bootstrap
