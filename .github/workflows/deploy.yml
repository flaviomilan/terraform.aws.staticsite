name: Deploy Static Site

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: ./src

jobs:
  # ============================================================
  # Step 1: Terraform Plan (always runs)
  # ============================================================
  plan:
    name: "📋 Terraform Plan"
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan (DNS only)
        id: plan
        run: |
          terraform plan -detailed-exitcode -out=tfplan-dns 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan-dns
            ${{ env.TF_WORKING_DIR }}/plan-output.txt

  # ============================================================
  # Step 2: Deploy DNS (Route53 hosted zone)
  # Output nameservers for registrar configuration
  # ============================================================
  deploy-dns:
    name: "🌐 Deploy DNS"
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply (DNS only)
        run: terraform apply -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Output Nameservers
        run: |
          echo "============================================="
          echo "🌐 NAMESERVERS FOR YOUR DOMAIN"
          echo "============================================="
          terraform output -json name_servers | jq -r '.[]'
          echo "============================================="
          echo ""
          echo "📝 Configure these nameservers at your domain"
          echo "   registrar, then approve the next step."
          echo "============================================="
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ============================================================
  # Step 3: Deploy Certificate + Validate DNS
  # Requires manual approval (environment: dns-validated)
  # ============================================================
  deploy-certificate:
    name: "🔐 Deploy Certificate"
    runs-on: ubuntu-latest
    needs: deploy-dns
    environment:
      name: dns-validated
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify DNS Propagation
        run: |
          DOMAIN="${{ vars.DOMAIN }}"
          echo "Verifying DNS propagation for ${DOMAIN}..."

          MAX_RETRIES=10
          RETRY_INTERVAL=30
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            NS_RECORDS=$(dig +short NS "${DOMAIN}" 2>/dev/null)
            if [ -n "$NS_RECORDS" ]; then
              echo "✅ DNS propagation confirmed!"
              echo "Nameservers found:"
              echo "$NS_RECORDS"
              SUCCESS=true
              break
            fi
            echo "⏳ DNS not yet propagated. Waiting ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          if [ "$SUCCESS" = false ]; then
            echo "⚠️ DNS propagation not confirmed after ${MAX_RETRIES} attempts."
            echo "Proceeding anyway — ACM validation may take longer."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply (Full Infrastructure)
        run: terraform apply -auto-approve -var="domain_enabled=true"
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ============================================================
  # Step 4: Deploy Site (upload files + invalidate cache)
  # Requires manual approval (environment: production)
  # ============================================================
  deploy-site:
    name: "🚀 Deploy Site"
    runs-on: ubuntu-latest
    needs: deploy-certificate
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="domain_enabled=true"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Invalidate CloudFront Cache
        run: |
          DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          if [ -n "$DISTRIBUTION_ID" ]; then
            echo "Invalidating CloudFront cache for distribution: ${DISTRIBUTION_ID}"
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
            echo "✅ Cache invalidation initiated."
          fi
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Deploy Summary
        run: |
          echo "============================================="
          echo "🎉 DEPLOYMENT COMPLETE"
          echo "============================================="
          terraform output -raw site_url || echo "Site URL not available"
          echo ""
          echo "============================================="
        working-directory: ${{ env.TF_WORKING_DIR }}